apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomad-frontend
  namespace: nomad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nomad-frontend
  template:
    metadata:
      labels:
        app: nomad-frontend
    spec:
      containers:
        - name: frontend
          image: your-dockerhub-user/nomad-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nomad-frontend
  namespace: nomad
spec:
  selector:
    app: nomad-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
