apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomad-backend
  namespace: nomad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nomad-backend
  template:
    metadata:
      labels:
        app: nomad-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub-user/nomad-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_ENABLED
              value: "false"
            - name: RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "300"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: nomad-backend-secrets
                  key: MONGO_URI
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: nomad-backend-secrets
                  key: CORS_ORIGIN
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nomad-backend-secrets
                  key: ADMIN_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: nomad-backend
  namespace: nomad
spec:
  selector:
    app: nomad-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
