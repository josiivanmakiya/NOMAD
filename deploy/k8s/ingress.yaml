apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nomad-ingress
  namespace: nomad
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: nomad.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nomad-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nomad-frontend
                port:
                  number: 80
