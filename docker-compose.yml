services:
  mongo:
    image: mongo:7
    container_name: nomad-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: nomad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: nomad-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/NOMAD
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8080
      AUTH_BYPASS: "false"
      ENABLE_PAYOUTS: "false"
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 300
      ADMIN_API_KEY: change-me-local-admin-key
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: nomad-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
